<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Certificate | RSCOE Mathematics Club (RMC)</title>
    <meta name="description" content="Download your participation certificate from RSCOE Mathematics Club events at JSPM Pune.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://rmcwebsite10.web.app/certificate.html">
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="apple-touch-icon" href="img/logo.png">

<body>

    <div class="cert-page-header">
        <img src="img/logo.png" alt="RSCOE Mathematics Club Logo" class="cert-logo">
        <h1>CERTIFICATE VERIFICATION</h1>
        <p>Download your participation certificate from RMC events</p>
    </div>

    <div class="cert-search-section">
        <div class="cert-search-card">
            <h3>🔍 SEARCH BY NAME OR RBT NUMBER</h3>
            <div class="cert-search-row">
                <input type="text" id="certSearch" placeholder="Enter your name or RBT number...">
                <select id="certEventFilter">
                    <option value="">All Events</option>
                </select>
            </div>
            <button class="cert-search-btn" onclick="searchCertificates()">
                <i class='bx bx-search'></i> Search Certificates
            </button>
        </div>
    </div>

    <div class="cert-results-section" id="certResults">
        <!-- Results appear here -->
    </div>

    <a href="index.html" class="cert-back-link">← Back to Home</a>

    <div class="toast" id="toast"></div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5JKcHWc9N7OcH57vFVxF5gBHxKfsgjSw",
            authDomain: "rmcwebsite10.firebaseapp.com",
            databaseURL: "https://rmcwebsite10-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rmcwebsite10",
            storageBucket: "rmcwebsite10.firebasestorage.app",
            messagingSenderId: "731012572422",
            appId: "1:731012572422:web:f1cc2692e7236f600daa87"
        };

        const app = initializeApp(firebaseConfig);

        window._firebaseDB = db;
        window._firebaseRef = ref;
        window._firebaseSet = set;
        window._firebaseGet = get;
        window._firebaseRemove = remove;
        window._firebaseOnValue = onValue;
        window._firebaseReady = true;
        window.dispatchEvent(new Event('firebaseReady'));
    </script>
    <script src="js/firebase-db.js"></script>
